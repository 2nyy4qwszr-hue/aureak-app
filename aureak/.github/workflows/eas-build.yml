name: EAS Build + E2E

on:
  push:
    branches: [main]

jobs:
  eas-build:
    name: EAS Build (development)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn
      - run: corepack enable
      - run: yarn install --immutable
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: eas build --platform all --profile development --non-interactive

  playwright-e2e:
    name: Playwright E2E (web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn
      - run: corepack enable
      - run: yarn install --immutable
        working-directory: .
      - run: npx playwright install --with-deps chromium
      - run: yarn expo start --web --port 8081 --non-interactive &
      - run: npx wait-on http://localhost:8081 --timeout 60000
      - run: npx playwright test
