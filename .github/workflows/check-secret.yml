name: "Health Check — ANTHROPIC_API_KEY"

# Objectif : confirmer que le secret ANTHROPIC_API_KEY est accessible
# et que l'API Claude répond avant de brancher les agents.
#
# Déclencheur PR désactivé : dépend d'un appel API Anthropic payant. Relancer
# manuellement via workflow_dispatch si tu viens de recharger ton crédit API.
on:
  workflow_dispatch:

jobs:
  check-secret:
    name: "Verification ANTHROPIC_API_KEY"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Anthropic SDK
        run: pip install anthropic

      - name: "Verifier presence du secret"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ERREUR : ANTHROPIC_API_KEY est absent ou vide."
            echo "  Aller dans Settings > Secrets and variables > Actions"
            echo "  Creer un secret nomme exactement ANTHROPIC_API_KEY"
            exit 1
          fi
          echo "OK : ANTHROPIC_API_KEY est present (${#ANTHROPIC_API_KEY} caracteres)"

      - name: "Valider la cle via appel API minimal"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 - <<'PYEOF'
          import anthropic, sys

          client = anthropic.Anthropic()
          try:
              response = client.messages.create(
                  model="claude-haiku-4-5-20251001",
                  max_tokens=16,
                  messages=[{"role": "user", "content": "Reponds uniquement: OK"}],
              )
              answer = response.content[0].text.strip()
              print(f"OK : API Claude operationnelle — reponse : {answer!r}")
              print(f"     Modele : {response.model}")
              print(f"     Tokens : {response.usage.input_tokens} in / {response.usage.output_tokens} out")
          except anthropic.AuthenticationError:
              print("ERREUR : Cle API invalide ou expiree.")
              print("  Verifier la valeur du secret ANTHROPIC_API_KEY dans GitHub.")
              sys.exit(1)
          except Exception as e:
              print(f"ERREUR : {e}")
              sys.exit(1)
          PYEOF

      - name: "Resume final"
        if: success()
        run: |
          echo "Health check reussi."
          echo "Le secret ANTHROPIC_API_KEY est valide."
          echo "Les agents QA peuvent etre branches."
